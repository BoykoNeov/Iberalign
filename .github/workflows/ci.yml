name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + test (engine & frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (engine crates)
        # Engine crates are dependency-light and need no webview system libs.
        run: cargo clippy -p align-core -p align-cli --all-targets -- -D warnings

      - name: Test (engine crates)
        run: cargo test -p align-core -p align-cli

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  desktop:
    name: Build desktop app (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # generate_context! embeds the built frontend, so build it first.
      - name: Build frontend
        run: npm run build

      - name: Build workspace (incl. Tauri shell)
        run: cargo build --workspace

      - name: Test workspace
        run: cargo test --workspace
